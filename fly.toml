# Fly.io deployment config for Westbridge ERP Backend API
# Deploy: fly deploy
# Docs: https://fly.io/docs/reference/configuration/

app = "westbridge-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

# Run Prisma migrations automatically before each deploy
[deploy]
  release_command = "node ./node_modules/prisma/build/index.js migrate deploy"

[env]
  NODE_ENV = "production"
  PORT = "4000"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/api/health"
  timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
