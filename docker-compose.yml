# Westbridge ERP — Full-stack local development
#
# Starts all services needed to run the complete Westbridge platform:
#   - PostgreSQL (app database)
#   - Redis (sessions, caching, BullMQ job queues)
#   - MariaDB (ERPNext database)
#   - ERPNext (headless ERP backend)
#   - Westbridge API (Express.js backend)
#
# Usage:
#   docker compose up -d
#   # Then start the frontend separately: cd ../Westbridge-ERP-1 && npm run dev
#
# First run:
#   docker compose up -d
#   docker compose exec api npx prisma migrate deploy
#   # Set up ERPNext site (see docs/SETUP.md)

services:
  # ─── PostgreSQL (Westbridge app database) ─────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: westbridge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Redis (sessions, cache, BullMQ queues) ───────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── MariaDB (ERPNext database) ──────────────────────────────────────────────
  mariadb:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: frappe
    volumes:
      - mariadb-data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── ERPNext (headless ERP backend) ───────────────────────────────────────────
  erpnext:
    image: frappe/erpnext:v16
    restart: unless-stopped
    environment:
      SITE_NAME: site1.local
      ADMIN_PASSWORD: admin
      DB_HOST: mariadb
      DB_PORT: "3306"
      DB_ROOT_USER: root
      DB_ROOT_PASSWORD: admin
      FRAPPE_REDIS_CACHE: redis://redis-erpnext:6379/0
      FRAPPE_REDIS_QUEUE: redis://redis-erpnext:6379/1
      FRAPPE_REDIS_SOCKETIO: redis://redis-erpnext:6379/2
    volumes:
      - erpnext-sites:/home/frappe/frappe-bench/sites
    ports:
      - "8080:8080"
    depends_on:
      mariadb:
        condition: service_healthy
      redis-erpnext:
        condition: service_healthy

  # ─── Redis for ERPNext (separate from app Redis) ──────────────────────────────
  redis-erpnext:
    image: redis:6.2-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Westbridge API (Express.js backend) ──────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "4000"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/westbridge
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      ERPNEXT_URL: http://erpnext:8080
      FRONTEND_URL: http://localhost:3000
      # SECURITY: These secrets MUST be set via .env file or environment variables.
      # The defaults below are ONLY safe for local development. In production,
      # generate cryptographically random values (e.g. openssl rand -hex 32).
      ENCRYPTION_KEY: "${ENCRYPTION_KEY:?ENCRYPTION_KEY must be set — run: openssl rand -hex 32}"
      CSRF_SECRET: "${CSRF_SECRET:?CSRF_SECRET must be set — run: openssl rand -hex 32}"
      SESSION_SECRET: "${SESSION_SECRET:?SESSION_SECRET must be set — run: openssl rand -hex 32}"
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres-data:
  mariadb-data:
  erpnext-sites:
