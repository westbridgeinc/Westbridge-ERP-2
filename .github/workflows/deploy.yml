name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger

concurrency:
  group: deploy-backend
  cancel-in-progress: false  # Don't cancel in-progress deploys

jobs:
  deploy:
    name: Deploy Backend
    runs-on: ubuntu-latest
    environment: production
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      # ── Railway deployment ──────────────────────────────────────────────────
      - name: Install Railway CLI
        if: env.RAILWAY_TOKEN != ''
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        if: env.RAILWAY_TOKEN != ''
        run: railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Railway — skip notice
        if: env.RAILWAY_TOKEN == '' && env.FLY_API_TOKEN == ''
        run: echo "::notice::Neither RAILWAY_TOKEN nor FLY_API_TOKEN configured — deployment skipped"

      # ── Fly.io deployment (fallback) ────────────────────────────────────────
      - name: Setup Fly.io CLI
        if: env.FLY_API_TOKEN != '' && env.RAILWAY_TOKEN == ''
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        if: env.FLY_API_TOKEN != '' && env.RAILWAY_TOKEN == ''
        run: flyctl deploy --remote-only
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          POSTHOG_HOST: ${{ vars.POSTHOG_HOST }}

      - name: Set Fly.io secrets (observability)
        if: env.FLY_API_TOKEN != '' && env.RAILWAY_TOKEN == ''
        run: |
          SECRETS_TO_SET=""
          if [ -n "${{ secrets.SENTRY_DSN }}" ]; then
            SECRETS_TO_SET="$SECRETS_TO_SET SENTRY_DSN=${{ secrets.SENTRY_DSN }}"
          fi
          if [ -n "${{ secrets.POSTHOG_API_KEY }}" ]; then
            SECRETS_TO_SET="$SECRETS_TO_SET POSTHOG_API_KEY=${{ secrets.POSTHOG_API_KEY }}"
          fi
          if [ -n "${{ vars.POSTHOG_HOST }}" ]; then
            SECRETS_TO_SET="$SECRETS_TO_SET POSTHOG_HOST=${{ vars.POSTHOG_HOST }}"
          fi
          if [ -n "$SECRETS_TO_SET" ]; then
            echo "Setting observability secrets on Fly.io..."
            flyctl secrets set $SECRETS_TO_SET --stage
            echo "Secrets staged for next deploy"
          else
            echo "::notice::No observability secrets configured — Sentry/PostHog will not be active"
          fi

      # ── Verify deployment ───────────────────────────────────────────────────
      - name: Verify deployment health
        if: env.RAILWAY_TOKEN != '' || env.FLY_API_TOKEN != ''
        run: |
          sleep 15
          DEPLOY_URL="${{ vars.DEPLOY_URL || 'https://westbridge-api.fly.dev' }}"
          STATUS=$(curl -sf "${DEPLOY_URL}/api/health" | jq -r '.status' || echo "unknown")
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "healthy" ]; then
            echo "::warning::Health check did not return healthy"
          fi
