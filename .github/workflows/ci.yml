name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── Security audit ──────────────────────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci --legacy-peer-deps
      - run: npx prisma generate
      - run: npm run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci --legacy-peer-deps
      - run: npx prisma generate
      - run: npx tsc --noEmit

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci --legacy-peer-deps
      - run: npx prisma generate
      - name: Run tests with coverage thresholds
        run: npm test -- --coverage --reporter=verbose
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci --legacy-peer-deps
      - run: npx prisma generate
      - run: npm run build

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [typecheck]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: westbridge_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/westbridge_test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/westbridge_test
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci --legacy-peer-deps
      - run: npx prisma generate
      - run: npx prisma db push --accept-data-loss
      - name: Run database integration tests
        run: npx vitest run src/__tests__/integration/ --reporter=verbose
      - name: Run rate limiter integration tests
        run: npx vitest run src/lib/api/__tests__/rate-limit-tiers.test.ts --reporter=verbose

  # ── Load Tests (k6 smoke) ───────────────────────────────────────────────────
  # Runs the k6 smoke test against the built app to verify performance baselines.
  # This uses a lightweight smoke test (1 VU, 30s) to catch regressions early.
  # Informational — the server may not start without full production secrets.
  load-test:
    name: Load Test (Smoke)
    runs-on: ubuntu-latest
    needs: [build]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: westbridge
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/westbridge
      REDIS_URL: redis://localhost:6379
      NODE_ENV: development
      PORT: "4000"
      SESSION_SECRET: ci-test-secret-not-for-production
      CSRF_SECRET: ci-test-csrf-not-for-production
      ENCRYPTION_KEY: ci-test-encryption-not-for-production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci --legacy-peer-deps
      - run: npx prisma generate
      - run: npx prisma db push --accept-data-loss
      - name: Build application
        run: npm run build
      - name: Install k6
        uses: grafana/setup-k6-action@v1
      - name: Start server
        run: |
          node dist/server.js > /tmp/server.log 2>&1 &
          SERVER_PID=$!
          echo "Server PID: $SERVER_PID"
          echo "Waiting for server to start (up to 30s)..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4000/api/health/live > /dev/null 2>&1; then
              echo "Server is up after ${i}s!"
              break
            fi
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "::warning::Server process exited unexpectedly"
              cat /tmp/server.log
              exit 0
            fi
            sleep 1
          done
          if ! curl -sf http://localhost:4000/api/health/live > /dev/null 2>&1; then
            echo "::warning::Server did not start within 30s"
            cat /tmp/server.log
            exit 0
          fi
      - name: Run k6 smoke test
        run: |
          k6 run load-tests/smoke.js || echo "::warning::k6 smoke test failed — see thresholds above"
        env:
          BASE_URL: http://localhost:4000

  # ── ERPNext Health Check ────────────────────────────────────────────────────
  # Spins up the full stack via Docker Compose and verifies ERPNext responds.
  # This is informational — ERPNext takes ~60s to initialise and may not
  # have a site configured in CI, so failures do not block merges.
  erpnext-health:
    name: ERPNext Stack Health
    runs-on: ubuntu-latest
    needs: [build]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Start ERPNext stack
        run: |
          docker compose up -d mariadb redis-erpnext erpnext
        env:
          ENCRYPTION_KEY: ci-test-encryption-key
          CSRF_SECRET: ci-test-csrf-key
          SESSION_SECRET: ci-test-session-key
      - name: Wait for ERPNext to become healthy
        run: |
          echo "Waiting for ERPNext to start (up to 120s)..."
          for i in $(seq 1 24); do
            STATUS=$(curl -sf http://localhost:8080/api/method/ping 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin).get('message',''))" 2>/dev/null || echo "")
            if [ "$STATUS" = "pong" ]; then
              echo "ERPNext is healthy!"
              exit 0
            fi
            echo "  Attempt $i/24 — waiting 5s..."
            sleep 5
          done
          echo "::warning::ERPNext did not respond within 120s — this is expected in CI without site setup"
      - name: Show container status
        if: always()
        run: docker compose ps
      - name: Show ERPNext logs
        if: always()
        run: docker compose logs erpnext --tail=50
      - name: Tear down
        if: always()
        run: docker compose down -v

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test, build]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t westbridge-erp-backend:ci .
